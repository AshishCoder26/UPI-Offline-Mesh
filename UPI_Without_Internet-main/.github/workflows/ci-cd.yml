name: CI/CD — UPI Offline Mesh

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/upi-offline-mesh
  IMAGE_TAG: ${{ github.sha }}
  JAVA_VERSION: '17'
  EKS_NAMESPACE: upi-mesh

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Build & Test with Maven
  # ═══════════════════════════════════════════════════════════════
  build-test:
    name: 🔨 Maven Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔨 Build with Maven (run tests)
        run: ./mvnw verify -B --no-transfer-progress

      - name: 📊 Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/upi-offline-mesh-*.jar
          retention-days: 5

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker image (only on push to main/master)
  # ═══════════════════════════════════════════════════════════════
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up JDK (needed for Maven layer cache in Docker)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_REPO }}:latest
          format: table
          exit-code: '0'           # don't fail build on vuln — just report
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: 📝 Output image digest
        run: echo "Image pushed → ${{ env.DOCKERHUB_REPO }}:${{ env.IMAGE_TAG }}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to AWS EKS (only on push to main/master)
  # ═══════════════════════════════════════════════════════════════
  deploy-k8s:
    name: 🚀 Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push'
    environment: production       # requires manual approval in GitHub Environments

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 🔧 Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: 📋 Apply Namespace & ConfigMap
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: 🏷️ Set image tag in Deployment manifest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|YOUR_DOCKERHUB_USERNAME/upi-offline-mesh:latest|${{ env.DOCKERHUB_REPO }}:${SHORT_SHA}|g" k8s/deployment.yaml

      - name: 🚀 Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: ⏳ Wait for rollout to complete
        run: |
          kubectl rollout status deployment/upi-mesh \
            -n ${{ env.EKS_NAMESPACE }} \
            --timeout=300s

      - name: ✅ Verify pods are running
        run: |
          kubectl get pods -n ${{ env.EKS_NAMESPACE }}
          kubectl get svc  -n ${{ env.EKS_NAMESPACE }}

      - name: 📋 Apply Ingress
        run: |
          kubectl apply -f k8s/ingress.yaml

      - name: 🔍 Deploy monitoring stack
        run: |
          kubectl apply -f monitoring/prometheus-configmap.yaml
          kubectl apply -f monitoring/prometheus-deployment.yaml
          kubectl apply -f monitoring/grafana-datasource-configmap.yaml
          kubectl apply -f monitoring/grafana-dashboard-configmap.yaml
          kubectl apply -f monitoring/grafana-deployment.yaml

      - name: 📣 Deployment summary
        run: |
          echo "=========================================="
          echo " ✅ Deployment successful!"
          echo " 🐳 Image : ${{ env.DOCKERHUB_REPO }}:$(echo '${{ github.sha }}' | cut -c1-7)"
          echo " 📦 Namespace : ${{ env.EKS_NAMESPACE }}"
          echo " 🌐 Ingress host : upi-mesh.example.com"
          echo " 📊 Grafana port : 30300"
          echo "=========================================="

  # ═══════════════════════════════════════════════════════════════
  # JOB 4 — Smoke Test (post-deploy health check)
  # ═══════════════════════════════════════════════════════════════
  smoke-test:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-k8s
    if: github.event_name == 'push'

    steps:
      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 🔧 Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: 🧪 Health check via port-forward
        run: |
          kubectl port-forward svc/upi-mesh-svc 8080:80 \
            -n ${{ env.EKS_NAMESPACE }} &
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health)
          echo "Health endpoint returned: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check FAILED (status $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Health check PASSED"
          kill %1 2>/dev/null || true
