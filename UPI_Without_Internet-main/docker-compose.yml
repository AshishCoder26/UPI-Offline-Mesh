version: "3.9"

services:

  # ── UPI Mesh Spring Boot Application ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upi-mesh-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - upi-network
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: upi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - upi-network
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: upi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=UpiMesh@2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/upi-mesh-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasource-local.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./monitoring/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./monitoring/grafana-dashboard-json:/var/lib/grafana/dashboards:ro
    networks:
      - upi-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  upi-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
