apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: upi-mesh
  labels:
    app: grafana
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-svc:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "10s"
          httpMethod: POST
