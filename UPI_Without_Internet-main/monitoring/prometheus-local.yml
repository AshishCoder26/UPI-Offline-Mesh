global:
  scrape_interval:     10s
  evaluation_interval: 15s

scrape_configs:
  # UPI Mesh app — running in Docker Compose as service "app"
  - job_name: 'upi-offline-mesh'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'upi-offline-mesh'
          environment: 'local'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
